<!DOCTYPE html>
<html>
    <head>
        <title>Inicio-AGRADECE_EN_COMPAÑIA</title>
        <meta charset="UTF-8">
        <meta name="Author" content="San Francisco Javier">
		<link rel="StyleSheet" href="./Estilos.css" type="text/css">
    </head>
    <body class="fondoIntroducir">
        <header class="tituloIntroducir">
            <img src="./imagenes/titulo.png"/>
            <br>
            <img src="./imagenes/comparte.png"/>
        </header>
        <article class="introducir">
            <div  class="inicio">
                <img src="./imagenes/inicia.png"/>
            </div>
            <div>
                <form action="" method="get">
                    <div>
                        <label for="correo">Correo electrónico:</label><br>
                        <input type="text" id="correo" name="correo" placeholder="Introduce tu correo" class="campo" required><br><br>

                        <label for="nombre">Contraseña:</label><br>
                        <input type="password" id="contraseña" name="contraseña" placeholder="Introduce tu contraseña" class="campo" required><br>
                    </div>
                    <div>
                        <p>
                            <input type="radio" id="recordarme" name="recordarme" value="recordarme" required>
                            <label for="recordarme">Recordarme</label>
                            <br>
                            <div class="btnEnviar">Enviar</div>
                        </p>
                    </div>
                </form>
            </div>
        </article>
    </body>
</html>
